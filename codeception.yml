namespace: Tests
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
actor_suffix: Tester
settings:
    shuffle: false
    lint: true
extensions:
    enabled:
        - Codeception\Extension\RunFailed
    # Allure and Qase reporters are installed as dev dependencies
    # (qase/codeception-reporter ^2.0, allure-framework/allure-codeception
    # ^2.4) and enabled in CI by uncommenting below. The local docker run
    # leaves them off so the suite stays self-contained.
    #
    #   - Qameta\Allure\Codeception\AllureCodeception
    #   - Qase\Codeception\Reporter
params:
    - .env
