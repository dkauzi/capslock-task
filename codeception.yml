namespace: Tests
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
actor_suffix: Tester
settings:
    shuffle: false
    lint: true
extensions:
    enabled:
        - Codeception\Extension\RunFailed
    # In real CI add:
    #   - Qase\Codeception\Reporter
    #   - Allure\Codeception\AllureCodeception
    # with matching config blocks; see README "Reporting & test management".
params:
    - .env
