namespace: Tests
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
actor_suffix: Tester
settings:
    shuffle: false
    lint: true
extensions:
    enabled:
        - Codeception\Extension\RunFailed
    # Allure and Qase reporters are installed as dev dependencies
    # (qase/codeception-reporter ^2.0, allure-framework/allure-codeception
    # ^2.4) and enabled in CI by uncommenting below. Local docker runs
    # leave them off so the suite stays self-contained and doesn't try to
    # reach the Qase API.
    #
    #   - Qameta\Allure\Codeception\AllureCodeception
    #   - Qase\Codeception\Reporter
    #
    # config:
    #   Qameta\Allure\Codeception\AllureCodeception:
    #     outputDirectory: tests/_output/allure-results
    #   Qase\Codeception\Reporter:
    #     projectCode: "%QASE_PROJECT_CODE%"
    #     apiToken:    "%QASE_API_TOKEN%"
    #     runComplete: true
params:
    - .env
